<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winter Collection</title>
    <link rel="stylesheet" href="page.css">
</head>
<body>

<!-- HEADER -->
<div class="collection-header">
    <h1>WINTER COLLECTION <span>198 Products</span></h1>

    <div class="sort-box">
        Sort by (Featured)
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- FILTER SIDEBAR -->
    <aside class="filters scrollable">

        <h3>Filters</h3>
        <hr>

        <!-- CATEGORY -->
        <div class="filter-group">
            <div class="filter-title">Category <span>−</span></div>
            <label><input type="checkbox"> Hoodie <span>(30)</span></label>
            <label><input type="checkbox"> Jackets <span>(82)</span></label>
            <label><input type="checkbox"> Sweaters <span>(20)</span></label>
            <label><input type="checkbox"> Sweatshirts <span>(66)</span></label>
        </div>

        <!-- COLOR -->
        <div class="filter-group">
            <div class="filter-title">Color <span>−</span></div>
            <label><input type="checkbox"> Beige <span>(15)</span></label>
            <label><input type="checkbox"> Black <span>(44)</span></label>
            <label><input type="checkbox"> Blue <span>(20)</span></label>
            <label><input type="checkbox"> Brown <span>(11)</span></label>
            <label><input type="checkbox"> Ecru <span>(1)</span></label>
            <div class="show-more">Show more</div>
        </div>

        <!-- PRICE -->
        <div class="filter-group">
            <div class="filter-title">Price <span>−</span></div>
            <p class="price-text">Selected Price Range</p>
            <p class="price-range">₹0 - ₹5000</p>
        </div>

        <!-- SIZE -->
        <div class="filter-group">
            <div class="filter-title">Size <span>−</span></div>
            <label><input type="checkbox"> S <span>(162)</span></label>
            <label><input type="checkbox"> M <span>(198)</span></label>
            <label><input type="checkbox"> L <span>(198)</span></label>
            <label><input type="checkbox"> XL <span>(198)</span></label>
            <label><input type="checkbox"> 2XL <span>(198)</span></label>
        </div>

        <!-- FIT -->
        <div class="filter-group">
            <div class="filter-title">Fit <span>−</span></div>
            <label><input type="checkbox"> Comfort Fit <span>(67)</span></label>
            <label><input type="checkbox"> Oversized <span>(46)</span></label>
            <label><input type="checkbox"> Regular <span>(19)</span></label>
            <label><input type="checkbox"> Relaxed Fit <span>(1)</span></label>
            <label><input type="checkbox"> Slim Fit <span>(65)</span></label>
        </div>

        <!-- PATTERN -->
        <div class="filter-group">
            <div class="filter-title">Pattern <span>−</span></div>
            <label><input type="checkbox"> All Over Print <span>(1)</span></label>
            <label><input type="checkbox"> Checkered <span>(4)</span></label>
            <label><input type="checkbox"> Color Block <span>(3)</span></label>
            <label><input type="checkbox"> Embroidered <span>(1)</span></label>
            <label><input type="checkbox"> Printed <span>(39)</span></label>
            <div class="show-more">Show more</div>
        </div>

        <!-- SLEEVE -->
        <div class="filter-group">
            <div class="filter-title">Sleeve <span>−</span></div>
            <label><input type="checkbox"> Full Sleeve <span>(198)</span></label>
        </div>

        <!-- NECK -->
        <div class="filter-group">
            <div class="filter-title">Neck <span>−</span></div>
            <label><input type="checkbox"> Crew Neck <span>(58)</span></label>
            <label><input type="checkbox"> High Neck <span>(11)</span></label>
            <label><input type="checkbox"> Hooded Neck <span>(33)</span></label>
            <label><input type="checkbox"> Polo Neck <span>(5)</span></label>
            <label><input type="checkbox"> Round Neck <span>(6)</span></label>
            <div class="show-more">Show more</div>
        </div>

        <!-- COLLAR -->
        <div class="filter-group">
            <div class="filter-title">Collar <span>−</span></div>
            <label><input type="checkbox"> High Neck <span>(15)</span></label>
            <label><input type="checkbox"> Hood <span>(18)</span></label>
            <label><input type="checkbox"> Mock Collar <span>(27)</span></label>
            <label><input type="checkbox"> Resort Collar <span>(2)</span></label>
            <label><input type="checkbox"> Spread <span>(20)</span></label>
        </div>

        <!-- FABRIC -->
        <div class="filter-group">
            <div class="filter-title">Fabric <span>−</span></div>
            <label><input type="checkbox"> Corduroy <span>(2)</span></label>
            <label><input type="checkbox"> Cotton Blend <span>(45)</span></label>
            <label><input type="checkbox"> Nylon <span>(28)</span></label>
            <label><input type="checkbox"> Polycotton <span>(25)</span></label>
            <label><input type="checkbox"> Polyester <span>(43)</span></label>
        </div>

    </aside>

    <!-- PRODUCTS -->
    <section class="products">
        <div class="product-card">
            <span class="badge">NEW DROP</span>
            <img src="images/p1.jpg">
        </div>

        <div class="product-card">
            <span class="badge">NEW DROP</span>
            <img src="images/p2.jpg">
        </div>

        <div class="product-card">
            <span class="badge">NEW DROP</span>
            <img src="images/p3.jpg">
        </div>
    </section>

</div>

</body>
</html>
