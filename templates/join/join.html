{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SEYVN Login</title>
    <link rel="stylesheet" href="{% static 'css/join.css' %}">
</head>
<body>

<div class="overlay">

    <!-- Close Button -->
    <a href="{% url 'winterwear' %}" class="close-btn">✕</a>

    <!-- Login Card -->
    <div class="login-box">

        <!-- Optional Logo -->
        <div class="logo">
            <a href="/home/">
                <img src="{% static 'images/Black.png' %}" alt="Logo">
            </a>
        </div>

        <p class="heading">Login Now & Enjoy Extra 10% Off</p>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <h2>Sign In</h2>

            <!-- Username -->
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>

            <!-- Password -->
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <!-- Register Link -->
            <p style="font-size:13px; margin-top:5px; color:#ccc;">
                Don't have an account?
                <a href="{% url 'register' %}" style="color:white; text-decoration:none;">Sign up</a>
            </p>

            <!-- Login Button -->
            <button type="submit" class="login-btn">Sign In</button>

        </form>

        <!-- Terms -->
        <p class="terms">
            By logging in, you're agreeing to our
            <span>Privacy Policy</span> and
            <span>Terms of Service</span>
        </p>

    </div>

</div>

</body>
</html>
