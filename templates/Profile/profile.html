{% load static %}.
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="profile-card">
                <div class="avatar-container">
                    <img src="{{ profile.avatar.url }}" alt="Profile Picture" class="avatar">
                    <span class="edit-icon">✎</span>
                </div>
                <h3>{{ user.username }}</h3>
            </div>

            <nav class="menu">
                <a href="{% url 'profile' %}" class="menu-item active">👤 Personal Information</a>
                <a href="#" class="menu-item">🔒 Login & Password</a>
                <a href="{% url 'logout' %}" class="menu-item logout">⏻ Log Out</a>
            </nav>
        </aside>

        <main class="main-content">
            <h2>Personal Information</h2>
            {% if messages %}
            <ul>
                {% for message in messages %}
                    <li style="color:green;">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="gender-selection">
                    <label><input type="radio" name="gender" value="Male" {% if profile.gender == "Male" %}checked{% endif %}> Male</label>
                    <label><input type="radio" name="gender" value="Female" {% if profile.gender == "Female" %}checked{% endif %}> Female</label>
                </div>

                <div class="form-grid">
                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" value="{{ user.first_name }}">
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" value="{{ user.last_name }}">
                    </div>
                    <div class="input-group full-width">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <input type="email" name="email" value="{{ user.email }}">
                            <span class="verified">✓ Verified</span>
                        </div>
                    </div>
                    <div class="input-group full-width">
                        <label>Address</label>
                        <input type="text" name="address" value="{{ profile.address }}">
                    </div>
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="text" name="phone" value="{{ profile.phone }}">
                    </div>
                    <div class="input-group">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" value="{{ profile.dob }}">
                    </div>
                    <div class="input-group">
                        <label>Location</label>
                        <select name="location">
                            <option selected>{{ profile.location }}</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Postal Code</label>
                        <input type="text" name="postal_code" value="{{ profile.postal_code }}">
                    </div>
                    <div class="input-group full-width">
                        <label>Change Avatar</label>
                        <input type="file" name="avatar">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="reset" class="btn-discard">Discard Changes</button>
                    <button type="submit" class="btn-save">Save Changes</button>
                </div>
            </form>
        </main>
    </div>

</html>
